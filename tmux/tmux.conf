set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

# Right: user@host | date time
set -g status-right-length 80
set -g status-right "#[fg=#6c7086]│ #[fg=#a6e3a1]#(whoami)#[fg=#6c7086]@#[fg=#89dceb]#H #[fg=#6c7086]│ #[fg=#f38ba8]%a %b %d #[fg=#6c7086]│ #[fg=#cdd6f4,bold]%H:%M "

# Window list
set -g window-status-format " #[fg=#6c7086]#I #W "
set -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I #W#{?window_zoomed_flag, ,} "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# Message/command bar
set -g message-style "bg=#313244,fg=#cdd6f4"

run '~/.tmux/plugins/tpm/tpm'

